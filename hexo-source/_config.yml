# Hexo Configuration

# Site
title: momo的博客
subtitle: love is magic
description: 这里写一句话介绍自己
keywords: blog, 个人博客
author: qwerd53
language: zh-CN
timezone: ''

# URL
url: https://qwerd53.github.io
root: /momo.github.io/
permalink: :year/:month/:day/:title/
permalink_pinyin:
  enable: true
  separator: '-'

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 12
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Pagination
per_page: 12
pagination_dir: page

# Extensions
theme: hexo-theme-matery

# Deployment
deploy:
  type: ''
